scrape_configs:
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
  - job_name: 'custom-nginx'
    static_configs:
      - targets: ['nginx-service:9113']
        labels:
          environment: production